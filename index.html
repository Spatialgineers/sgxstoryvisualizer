    <style>

        input[type=range] { accent-color: #FDCC0D; width: 100%; height: 4px; cursor: pointer; background: #333; border-radius: 2px; outline: none; -webkit-appearance: none; margin-top: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #FDCC0D; cursor: pointer; border: 2px solid #000; }

<body class="flex flex-col md:flex-row h-screen w-full">

    <!-- RENDER ENGINE / CANVAS AREA (Arriba en móvil, Derecha en Desktop) -->
    <main class="w-full md:flex-1 h-[45vh] md:h-screen flex flex-col items-center justify-center p-2 md:p-6 canvas-container relative order-1 md:order-2 z-0 border-b md:border-b-0 border-[#262626]">
        <!-- Se eliminó crossorigin="anonymous" para evitar bloqueos CORS en archivos locales -->
        <video id="hidden-video" class="hidden" loop muted playsinline></video>
        <canvas id="render-canvas" class="max-w-full max-h-full object-contain shadow-[0_0_40px_rgba(253,204,13,0.05)] bg-black border border-[#262626] rounded-sm"></canvas>
    </main>

    <!-- CONTROL CENTER (Abajo en móvil, Izquierda en Desktop) -->
    <!-- Flex estricto: Todo el sidebar es flex-col, ocupando el alto designado -->
    <aside class="w-full md:w-[320px] h-[55vh] md:h-screen bg-[#0a0a0a] border-r border-[#262626] flex flex-col order-2 md:order-1 relative z-10 shadow-2xl">
        
        <!-- Header (shrink-0 asegura que nunca se comprima) -->
        <div class="px-4 py-3 bg-[#0a0a0a] border-b border-[#262626] flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-sm md:text-base font-bold tracking-tight text-[#FDCC0D] italic">SGX VISUALIZER</h1>
                <p class="text-[8px] text-gray-500 font-mono uppercase tracking-widest leading-none">Narrative Engine 2.1</p>
            </div>
            <label class="bg-[#32527B] hover:bg-[#254063] text-white text-[9px] font-bold py-1.5 px-3 rounded cursor-pointer transition-colors uppercase tracking-wider">
                Load
                <input type="file" id="video-upload" accept="video/*" class="hidden">
            </label>
        </div>

        <!-- Scrollable Controls (flex-1 absorbe el espacio restante, overflow-y-auto maneja el scroll) -->
        <div class="p-4 flex-1 overflow-y-auto scrollable-area flex flex-col gap-2 pb-6">
            
            <!-- Base Color -->
            <div class="control-group border-[#FDCC0D]/20">
                <h2 class="text-[9px] font-bold text-[#888888] uppercase tracking-widest border-b border-[#262626] pb-1 mb-3">Color Base (GPU Buffer)</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Brt</span> <span id="val-bright">100%</span></label>

                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Con</span> <span id="val-cont">100%</span></label>

                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Sat</span> <span id="val-sat">100%</span></label>
                        <input type="range" id="fx-sat" min="0" max="300" value="100">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Hue</span> <span id="val-hue">0°</span></label>
                        <input type="range" id="fx-hue" min="-180" max="180" value="0">
                    </div>
                </div>
            </div>

            <!-- FX -->
            <div class="control-group border-red-500/10">
                <h2 class="text-[9px] font-bold text-[#888888] uppercase tracking-widest border-b border-[#262626] pb-1 mb-3">Psychological FX</h2>
                
                <div class="flex items-center gap-3 mb-4">
                    <input type="color" id="fx-tint-color" value="#ff0000">
                    <div class="flex-1">
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Mood Tint</span> <span id="val-tint">0%</span></label>
                        <input type="range" id="fx-tint-power" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Lens Blur</span> <span id="val-blur">0px</span></label>
                        <input type="range" id="fx-blur" min="0" max="20" value="0" step="0.5">
                    </div>

                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Vignette</span> <span id="val-vig">0%</span></label>
                        <input type="range" id="fx-vig" min="0" max="100" value="0">
                    </div>

                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Film Grain</span> <span id="val-grain">0%</span></label>
                        <input type="range" id="fx-grain" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Invert</span> <span id="val-invert">0%</span></label>
                        <input type="range" id="fx-invert" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <!-- Degradation -->
            <div class="control-group">
                <h2 class="text-[9px] font-bold text-[#888888] uppercase tracking-widest border-b border-[#262626] pb-1 mb-3">Degradation</h2>
                <div class="space-y-3">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>Glitch Tear</span> <span id="val-glitch">0%</span></label>
                        <input type="range" id="fx-glitch" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-gray-300"><span>CRT Scanlines</span> <span id="val-crt">0%</span></label>
                        <input type="range" id="fx-crt" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>

        <!-- Render Footer (shrink-0 asegura que siempre esté fijo abajo sin pisar el contenido) -->
        <div class="px-4 py-3 bg-[#0a0a0a] border-t border-[#262626] shrink-0">
            <button id="render-btn" class="w-full bg-[#FDCC0D] text-black text-xs font-bold py-2.5 rounded hover:bg-yellow-400 transition-colors disabled:opacity-50 disabled:bg-gray-700 disabled:text-gray-400 uppercase tracking-wider shadow-[0_0_15px_rgba(253,204,13,0.2)]" disabled>
                Record Output
            </button>
            <p id="render-status" class="text-[8px] text-center text-gray-500 mt-1.5 font-mono uppercase tracking-widest">Awaiting Media...</p>
        </div>
    </aside>

    <script>
        const videoInput = document.getElementById('video-upload');
        const video = document.getElementById('hidden-video');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d'); 
        const renderBtn = document.getElementById('render-btn');
        const renderStatus = document.getElementById('render-status');

        // UI Binding Array
        const inputs = {
            bright: document.getElementById('fx-bright'),
            cont: document.getElementById('fx-cont'),
            sat: document.getElementById('fx-sat'),
            hue: document.getElementById('fx-hue'),
            tintColor: document.getElementById('fx-tint-color'),
            tint: document.getElementById('fx-tint-power'),
            blur: document.getElementById('fx-blur'),
            vig: document.getElementById('fx-vig'),
            grain: document.getElementById('fx-grain'),
            invert: document.getElementById('fx-invert'),
            glitch: document.getElementById('fx-glitch'),
            crt: document.getElementById('fx-crt')
        };

        Object.keys(inputs).forEach(key => {
            if (inputs[key] && inputs[key].type === 'range') {
                inputs[key].addEventListener('input', (e) => {
                    let unit = key === 'hue' ? '°' : key === 'blur' ? 'px' : '%';
                    const labelSpan = document.getElementById(`val-${key}`);
                    if(labelSpan) labelSpan.textContent = e.target.value + unit;
                });
            }
        });

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }

        // --- ARQUITECTURA DE BUFFERS (FIX PARA FILTROS EN VIDEO) ---
        // 1. Frame Buffer (El bypass para el bug de hardware)
        const bufferCanvas = document.createElement('canvas');
        const bufferCtx = bufferCanvas.getContext('2d');

        // 2. Offscreen FX Canvases
        const noiseCanvas = document.createElement('canvas');
        function generateNoisePattern(w, h) {
            noiseCanvas.width = w;
            noiseCanvas.height = h;
            const noiseCtx = noiseCanvas.getContext('2d');
            const imgData = noiseCtx.createImageData(w, h);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) {
                const v = Math.random() * 255;
                buffer[i] = (255 << 24) | (v << 16) | (v << 8) | v;
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        const crtCanvas = document.createElement('canvas');
        function generateCRT(w, h) {
            crtCanvas.width = w;
            crtCanvas.height = h;
            const cCtx = crtCanvas.getContext('2d');
            cCtx.fillStyle = 'rgba(0, 0, 0, 1)'; 
            for (let i = 0; i < h; i += 4) cCtx.fillRect(0, i, w, 2);
        }

        const vigCanvas = document.createElement('canvas');
        function generateVignette(w, h) {
            vigCanvas.width = w;
            vigCanvas.height = h;
            const vCtx = vigCanvas.getContext('2d');
            let gradient = vCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.7);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,1)');
            vCtx.fillStyle = gradient;
            vCtx.fillRect(0, 0, w, h);
        }

        let isPlaying = false;
        let animationFrameId;

        // MEDIA INGEST
        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            video.src = url;
            video.play();
            isPlaying = true;
            renderBtn.disabled = false;
            renderStatus.textContent = "READY FOR RENDER";

            video.onloadedmetadata = () => {
                // Sincronizar dimensiones del canvas principal
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Sincronizar dimensiones del buffer
                bufferCanvas.width = canvas.width;
                bufferCanvas.height = canvas.height;
                
                // Generar recursos offscreen
                generateNoisePattern(canvas.width + 100, canvas.height + 100); 
                generateCRT(canvas.width, canvas.height);
                generateVignette(canvas.width, canvas.height);

                drawFrame();
            };
        });

        // SGX RENDER LOOP
        function drawFrame() {
            if (!isPlaying) return;
            const w = canvas.width;
            const h = canvas.height;

            // FIX: Extraer el frame puro del video al Buffer Canvas primero.
            // Esto convierte el video (hardware texture) en un bitmap estático
            bufferCtx.drawImage(video, 0, 0, w, h);

            // 1. HARDWARE ACCELERATED FILTERS (Aplicado sobre el Buffer, no sobre el video directo)
            // Esto garantiza que el filtro CSS funcione en cualquier navegador móvil o de escritorio
            ctx.filter = `brightness(${inputs.bright.value}%) contrast(${inputs.cont.value}%) saturate(${inputs.sat.value}%) hue-rotate(${inputs.hue.value}deg) invert(${inputs.invert.value}%) blur(${inputs.blur.value}px)`;
            ctx.drawImage(bufferCanvas, 0, 0, w, h);
            ctx.filter = 'none'; // Importante resetear para que no afecte el resto de los FX

            // 2. TINT
            if (inputs.tint.value > 0) {
                ctx.fillStyle = `rgba(${hexToRgb(inputs.tintColor.value)}, ${inputs.tint.value / 100})`;
                ctx.globalCompositeOperation = 'multiply';
                ctx.fillRect(0, 0, w, h);
                ctx.globalCompositeOperation = 'source-over';
            }

            // 3. GRAIN
            if (inputs.grain.value > 0) {
                ctx.globalAlpha = inputs.grain.value / 200; 
                ctx.globalCompositeOperation = 'overlay';
                ctx.drawImage(noiseCanvas, -(Math.random() * 50), -(Math.random() * 50));
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
            }

            // 4. GLITCH
            const glitchVal = parseInt(inputs.glitch.value);
            if (glitchVal > 0 && Math.random() < (glitchVal / 100) * 0.4) {
                const sliceH = Math.max(1, Math.random() * (h / 8));
                const sliceY = Math.random() * (h - sliceH);
                const shiftX = (Math.random() - 0.5) * glitchVal * (w / 30);
                
                ctx.drawImage(canvas, 0, sliceY, w, sliceH, shiftX, sliceY, w, sliceH);
                ctx.fillStyle = 'rgba(255, 0, 50, 0.3)';
                ctx.globalCompositeOperation = 'screen';
                ctx.fillRect(Math.max(0, shiftX), sliceY, w, sliceH);
                ctx.globalCompositeOperation = 'source-over';
            }

            // 5. CRT
            if (inputs.crt.value > 0) {
                ctx.globalAlpha = inputs.crt.value / 100;
                ctx.drawImage(crtCanvas, 0, 0);
                ctx.globalAlpha = 1.0;
            }

            // 6. VIGNETTE
            if (inputs.vig.value > 0) {
                ctx.globalAlpha = inputs.vig.value / 100;
                ctx.drawImage(vigCanvas, 0, 0);
                ctx.globalAlpha = 1.0;
            }

            animationFrameId = requestAnimationFrame(drawFrame);
        }

        // MEDIA RECORDER PIPELINE
        let mediaRecorder;
        let recordedChunks = [];

        renderBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                video.loop = true;
                renderBtn.textContent = 'Record Output';
                renderBtn.classList.replace('bg-red-600', 'bg-[#FDCC0D]');
                renderBtn.classList.replace('text-white', 'text-black');
                renderStatus.textContent = "PROCESSING...";
                return;
            }

            recordedChunks = [];
            const stream = canvas.captureStream(30);
            let mimeType = 'video/mp4';
            let fileExtension = 'mp4';

            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9';
                fileExtension = 'webm';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `SGX_Story_${Date.now()}.${fileExtension}`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
                renderStatus.textContent = `SAVED AS .${fileExtension.toUpperCase()}`;
            };

            video.currentTime = 0;
            video.loop = false;
            video.play();
            mediaRecorder.start();
            
            renderBtn.textContent = '■ STOP';
            renderBtn.classList.replace('bg-[#FDCC0D]', 'bg-red-600');
            renderBtn.classList.replace('text-black', 'text-white');
            renderStatus.textContent = "RECORDING...";

            video.onended = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') renderBtn.click();
            };
        });
    </script>
</body>
</html>
